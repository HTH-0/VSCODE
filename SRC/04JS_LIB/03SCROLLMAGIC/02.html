<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="//cdnjs.cloudflare.com/ajax/libs/ScrollMagic/2.0.7/ScrollMagic.min.js"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/ScrollMagic/2.0.7/plugins/debug.addIndicators.min.js"></script>
</head>

<style>
    section {
        width: 1200px;
        margin: 0 auto;
        height: 500px;
        border: 1px solid;
        margin-bottom: 20px;

        position: relative;
    }

    .ball {
        width: 100px;
        height: 100px;
        border: 1px solid;
        border-radius: 50%;

        display: flex;
        justify-content: center;
        align-items: center;
        position: absolute;
        top: 0;
        left: 0;
        transition: .5s;
    }

    .move {
        left: calc(100% - 100px);
        top: calc(100% - 100px);
    }

    .move2 {
        left: calc(100% - 100px);
        top: calc(100% - 100px);
        transform: rotate(350deg) scale(1.2);
        transition: 2s;
    }
</style>

<body>


    <section></section>
    <section class="scroll-section scroll-spy first">
        <div class="ball">BALL</div>
    </section>
    <section class="scroll-section scroll-spy second">
        <div class="ball">BALL</div>
    </section>
    <section></section>


    <script>
        const spyedEls = document.querySelectorAll('.scroll-spy');
        
        spyedEls.forEach((el) => {
            const ballEl = el.querySelector('.ball');
            if (el.classList.contains('first')) {
                new ScrollMagic.Scene({
                    triggerElement: spyedEls,
                    triggerHook: .5,
                })
                    .setClassToggle(ballEl, 'move')
                    .addTo(new ScrollMagic.Controller());

            }
            else if (el.classList.contains('second')) {
                new ScrollMagic.Scene({
                    triggerElement: spyedEls,// 감시할 요소 선택
                    triggerHook: .5, //스크롤 위치값
                })
                    .setClassToggle(ballEl, 'move2')
                    .addTo(new ScrollMagic.Controller());
            }
        });
       



    </script>

</body>

</html>
