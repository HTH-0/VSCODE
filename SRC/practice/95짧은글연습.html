<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&" />
    <style>
        .material-symbols-outlined {
            font-variation-settings:
                'FILL' 0,
                'wght' 400,
                'GRAD' 0,
                'opsz' 24
        }

        .wallpaper {
            width: 1280;
            height: 940px;
            border: 1px solid;
            background-color: rgb(192, 192, 192);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .wallpaper>div {
            width: 800px;
            height: 600px;
            border: 2px solid;
            display: flex;
            align-items: center;
            /* justify-content: center; */
            flex-direction: column;

        }

        /* 상단 타자연습 부분 */
        .header {
            width: 100%;
            top: 0;
        }

        .header li {
            list-style: none;
            text-align: left;
            padding: 0 10px;
            background-color: rgb(0, 0, 123);
            color: white;
        }

        /* 타자 입력 부분 */
        .container {
            background-color: rgb(192, 192, 192);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 600px;
            height: 450px;
        }

        .container>.target {
            border: 1px solid;
            width: 100%;
            height: 400px;
        }

        .container>.result {
            border: 1px solid;
            width: 100%;
            height: 25px;
        }

        .container>input[type="text"] {
            border: 1px solid;
            background-color: rgb(192, 192, 192);
            width: 100%;
            padding: 0;
            height: 25px;
        }

        /* status */
        .status {
            border: 1px solid;
            width: 600px;
            height: 150px;
        }

        .valid {
            color: green;
        }

        .invalid {
            color: red;
        }
    </style>
</head>

<body>
    <div class="wallpaper">
        <div>
            <div class="header">
                <li>타자연습</li>
            </div>
            <div class="container">
                <div id="target-text" class="target">입력해야 할 텍스트들</div>
                <div id="result" class="result">입력된 값이 올바른지 여부를 확인하는 부분입니다.</div>
                <input type="text" id="input-text" placeholder="위 문장을 입력하세요">
            </div>
            <div class="status">

            </div>
        </div>
    </div>


    <script>
        const targetTextEl = document.querySelector('#target-text');
        const inputEl = document.querySelector('#input-text');
        const resultEl = document.querySelector('#result');

        // 입력해야 할 문장들 세팅
        const texts = [
            "안녕하세요",
            "반갑습니다",
            "잘부탁드립니다",
            "잘가세요",
            "오늘도 좋은 하루",
            "행복하세요",
            "즐겁게 지내세요",
            "다시 만나요"
        ];

        // 몇 번째 문장인지 나타내기 위한 변수
        let textsnum = 0;

        // 4개씩 묶어 보여주기
        function displaytext() {
            const showtext = texts.slice(textsnum, textsnum + 4);
            targetTextEl.innerHTML = showtext.join('<br>');
        }

        // 정확함을
        function perfect() {
            const text = texts[textsnum];
            const inputValue = inputEl.value;  // input값을 실시간으로 가져옴
            let resultHTML = '';

            // 입력한 문자와 목표 문장 비교
            for (let i = 0; i < inputValue.length; i++) {
                if (i >= text.length) {
                    // 총 길이를 초과했을 때 불합격
                    resultHTML += `<span class="invalid">${inputValue[i]}</span>`;
                } else if (text[i] !== inputValue[i]) {
                    // 글자가 같지 않을 때 불합격
                    resultHTML += `<span class="invalid">${inputValue[i]}</span>`;
                } else {
                    // 맞는 글자는 합격
                    resultHTML += `<span class="valid">${inputValue[i]}</span>`;
                }
            }

            resultEl.innerHTML = resultHTML;
        }

        // 엔터를 눌렀을때 함수
        function pressEnter(e) {
            const text = texts[textsnum];
            const inputValue = inputEl.value;

            if (e.keyCode === 13) {
                if (inputValue === text) {
                    //맞다면 한줄씩 위로 올린다
                    textsnum += 1;
                    displaytext();
                    //입력,결과창 비우기
                    inputEl.value = '';
                    resultEl.innerHTML = ''; 
                } else {
                    //실패해도 일단 비우기
                    inputEl.value = ''; 
                    resultEl.innerHTML = '';
                }
            }
        }

        inputEl.addEventListener('input', perfect);

        inputEl.addEventListener('keydown', pressEnter);

        displaytext(); 
    </script>
</body>

</html>
